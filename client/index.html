<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pago Express</title>
    
    <!-- Favicon simple y directo usando forum.png -->
    <link rel="icon" type="image/png" href="/favicon.png?v=20250425forum">
    
    <!-- Otros formatos de favicon -->
    <link rel="apple-touch-icon" href="/favicon.png?v=20250425forum">
    <link rel="shortcut icon" href="/favicon.png?v=20250425forum" type="image/png">
    
    <!-- Script para habilitar reproducción de audio en el documento -->
    <script>
      // Crear elementos de audio que estarán disponibles globalmente
      window.addEventListener('DOMContentLoaded', function() {
        // Crear audio para sonido squirtle
        const squirtleAudio = document.getElementById('squirtle-audio');
        if (!squirtleAudio) {
          const newAudio = document.createElement('audio');
          newAudio.id = 'squirtle-audio';
          newAudio.src = '/sounds/squirtle.mp3';
          newAudio.preload = 'auto';
          document.body.appendChild(newAudio);
        }
        
        // Crear audio para notificación
        const notificationAudio = document.getElementById('notification-audio');
        if (!notificationAudio) {
          const newAudio = document.createElement('audio');
          newAudio.id = 'notification-audio';
          newAudio.src = '/sounds/notification.mp3';
          newAudio.preload = 'auto';
          document.body.appendChild(newAudio);
        }
        
        // Añadir las funciones globales para la reproducción
        window.playSquirtleSound = function() {
          const audio = document.getElementById('squirtle-audio');
          if (audio) {
            audio.currentTime = 0;
            audio.volume = 1.0;
            audio.play().catch(e => console.error('Error reproduciendo squirtle:', e));
            return true;
          }
          return false;
        };
        
        window.playPaymentCompletedSound = function() {
          const audio = document.getElementById('notification-audio');
          if (audio) {
            audio.currentTime = 0;
            audio.volume = 1.0;
            audio.play().catch(e => console.error('Error reproduciendo notificación:', e));
            return true;
          }
          return false;
        };
        
        console.log('🔊 Sistema de audio inicializado en el documento');
      });
    </script>
    
    <!-- Forzar recarga de recursos -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <meta name="theme-color" content="#0e4f88">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
